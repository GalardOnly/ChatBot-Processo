# =============================================================================
# nginx.conf - Reverse proxy para Defensor IA (Streamlit)
# Seguranca B4: security headers, HTTPS, rate limiting no nivel do nginx
#
# USO:
#   1. Instalar nginx na VPS/servidor
#   2. Copiar este arquivo para /etc/nginx/sites-available/defensor-ia
#   3. ln -s /etc/nginx/sites-available/defensor-ia /etc/nginx/sites-enabled/
#   4. Obter certificado SSL: certbot --nginx -d SEU_DOMINIO.COM.BR
#   5. nginx -t && systemctl reload nginx
#
# O Streamlit deve rodar localmente na porta 8501 (sem HTTPS):
#   streamlit run app.py --server.port 8501 --server.address 127.0.0.1
# =============================================================================

# Rate limiting global: max 30 requisicoes/segundo por IP
# Protege contra brute-force e DDoS basico
limit_req_zone $binary_remote_addr zone=defensor_ia:10m rate=30r/s;

# Rate limiting estrito para WebSocket do Streamlit
limit_req_zone $binary_remote_addr zone=defensor_ws:10m rate=5r/s;

server {
    listen 80;
    server_name SEU_DOMINIO.COM.BR;

    # Redirecionar todo HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO.COM.BR;

    # -------------------------------------------------------------------------
    # Certificado SSL (gerenciado pelo Certbot / Let's Encrypt)
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # Security Headers (B4)
    # -------------------------------------------------------------------------

    # Previne clickjacking (exibir o app dentro de iframes maliciosos)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Previne MIME sniffing (browser nao deve adivinhar o content-type)
    add_header X-Content-Type-Options "nosniff" always;

    # Forcja HTTPS por 1 ano (HSTS - HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Desativa o XSS auditor legado e define politica moderna
    add_header X-XSS-Protection "0" always;

    # Referrer Policy: nao vazar URL completa para dominios externos
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy: desabilitar funcionalidades de browser nao usadas
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy: restringir origens de recursos
    # NOTA: Streamlit carrega recursos do proprio servidor + CDNs para componentes
    # Ajuste as origens conforme necessario para seus componentes customizados
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval' blob:;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com data:;
        img-src     'self' data: blob: https:;
        connect-src 'self' wss: ws: https://*.supabase.co;
        frame-ancestors 'self';
        base-uri    'self';
        form-action 'self';
    " always;

    # -------------------------------------------------------------------------
    # Limite de tamanho de upload (alinhado com config.toml maxUploadSize=50)
    # -------------------------------------------------------------------------
    client_max_body_size 52m;

    # -------------------------------------------------------------------------
    # Proxy para o Streamlit (HTTP + WebSocket)
    # -------------------------------------------------------------------------
    location / {
        # Rate limiting: burst de 60 requisicoes, depois processa sequencialmente
        limit_req zone=defensor_ia burst=60 nodelay;

        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Headers necessarios para o Streamlit funcionar corretamente
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Timeouts para sessoes longas do Streamlit (analise de PDFs grandes)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Desabilitar buffering para SSE/streaming funcionar
        proxy_buffering off;
    }

    # WebSocket especifico do Streamlit
    location /_stcore/stream {
        limit_req zone=defensor_ws burst=10 nodelay;

        proxy_pass         http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;  # 24h para conexoes WebSocket longas
    }

    # -------------------------------------------------------------------------
    # Bloquear acesso a arquivos sensiveis
    # -------------------------------------------------------------------------

    # Negar acesso ao .streamlit/ e arquivos de configuracao
    location ~* /\.streamlit {
        deny all;
        return 404;
    }

    # Negar acesso a arquivos .env, .git, etc.
    location ~* \.(env|git|sql|log|toml|lock)$ {
        deny all;
        return 404;
    }

    # -------------------------------------------------------------------------
    # Logs
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/defensor-ia-access.log;
    error_log  /var/log/nginx/defensor-ia-error.log warn;
}

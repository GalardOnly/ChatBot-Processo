[theme]
base = "light"
primaryColor = "#1f3a5f"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f4f6f9"
textColor = "#0f172a"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Limite de upload alinhado com config.MAX_FILE_SIZE_MB (Seguranca A1)
# Rejeita arquivos grandes ANTES de chegarem ao Python, evitando carga desnecessaria na RAM
maxUploadSize = 50
